<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>輸入兩科成績-6</title>
    <script>
        function ch ( )
        {
            var flag=true;
            if(document.form1.username.value=="")
        {
            window.alert('請輸入姓名');
            document.form1.username.focus( );
            flag=false;
            return flag;
        }
        var re =/^[0-9]+\.?[0-9]*$/;
        if(!re.test(document.form1.grade1.value))
        {
            alert("國文成績必須有整數資料");
            document.form1.grade1.value="";
            flag=false;
            return flag;
        }
        if(!re.test(document.form1.grade2.value))
        {
            alert("英文成績必須有整數資料");
            document.form1.grade2.value="";
            flag=false;
            return flag;
        }
        return flag;
        }
    </script>
</head>
<body>
    <div>
        <div>請輸入姓名與國文與英文成績</div>
        <form name="form1" method="post" action="s6.php" onsubmit="return ch( )">
            學生姓名:<br>
            <input type="text" name="username" maxlength="6" size="6"><br>
            國文成績:<br>
            <input type="text" name="grade1" maxlength="3" size="3"><br>
            英文成績:<br>
            <input type="text" name="grade2" maxlength="3" size="3"><br>
            <input type="submit">
        </form>
    </div>
</body>
</html>
